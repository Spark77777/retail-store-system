<!DOCTYPE html>
<html>
<head>
    <title>Retail Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🛒 Retail Store Management</h1>

    <!-- ADD PRODUCT -->
    <div class="card">
        <h2>Add Product</h2>
        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price">
        <input id="qty" placeholder="Quantity">
        <button onclick="addProduct()">Add</button>
    </div>

    <!-- INVENTORY -->
    <div class="card">
        <h2>Inventory</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

    <!-- TOTAL SALES -->
    <div class="card">
        <h2>Total Revenue</h2>
        <h3 id="totalSales">₹0</h3>
    </div>

    <!-- SALES HISTORY -->
    <div class="card">
        <h2>Sales History</h2>
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="salesTable"></tbody>
        </table>
    </div>

</div>

<script>

// ---------------------- PRODUCTS ----------------------

async function loadProducts() {
    let res = await fetch('/products');
    let data = await res.json();

    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(p => {
        table.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td>₹${p.price}</td>
            <td>${p.stock_quantity}</td>
            <td>
                <button class="sell-btn" onclick="sell(${p.product_id})">Sell</button>
                <button class="delete-btn" onclick="deleteProduct(${p.product_id})">Delete</button>
            </td>
        </tr>`;
    });
}

// ---------------------- ADD PRODUCT ----------------------

async function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let qty = document.getElementById("qty").value;

    if (!name || !price || !qty) {
        alert("Please fill all fields");
        return;
    }

    let res = await fetch('/add_product', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, price, qty })
    });

    let data = await res.json();
    alert(data.message || data.error);

    refreshUI();
}

// ---------------------- SELL ----------------------

async function sell(id) {
    let qty = prompt("Enter quantity");

    if (!qty || isNaN(qty) || qty <= 0) {
        alert("Enter a valid quantity");
        return;
    }

    try {
        let res = await fetch('/sell', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, qty })
        });

        let data = await res.json();
        alert(data.message || data.error);

        refreshUI();

    } catch {
        alert("Error processing sale");
    }
}

// ---------------------- DELETE ----------------------

async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;

    try {
        let res = await fetch('/delete_product', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });

        let data = await res.json();
        alert(data.message || data.error);

        refreshUI();

    } catch {
        alert("Error deleting product");
    }
}

// ---------------------- SALES HISTORY ----------------------

async function loadSales() {
    let res = await fetch('/sales');
    let data = await res.json();

    let table = document.getElementById("salesTable");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="4">No sales yet</td></tr>`;
        return;
    }

    data.forEach(s => {
        table.innerHTML += `
        <tr>
            <td>${s.product}</td>
            <td>${s.quantity}</td>
            <td>₹${s.price}</td>
            <td>${formatDate(s.date)}</td>
        </tr>`;
    });
}

// ---------------------- TOTAL SALES ----------------------

async function loadTotalSales() {
    let res = await fetch('/total_sales');
    let data = await res.json();

    document.getElementById("totalSales").innerText =
        "₹" + (data.total_sales || 0);
}

// ---------------------- FORMAT DATE ----------------------

function formatDate(dateString) {
    let d = new Date(dateString);
    return d.toLocaleString();
}

// ---------------------- REFRESH ----------------------

function refreshUI() {
    loadProducts();
    loadSales();
    loadTotalSales();
}

// ---------------------- INITIAL LOAD ----------------------

refreshUI();

</script>

</body>
</html>
