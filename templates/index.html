<!DOCTYPE html>
<html>
<head>
    <title>Retail Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Retail Store Management</h1>

    <div class="card">
        <h2>Add Product</h2>
        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price">
        <input id="qty" placeholder="Quantity">
        <button onclick="addProduct()">Add</button>
    </div>

    <div class="card">
        <h2>Inventory</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>

<script>
async function loadProducts() {
    let res = await fetch('/products');
    let data = await res.json();

    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(p => {
        table.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td>₹${p.price}</td>
            <td>${p.stock_quantity}</td>
            <td>
                <button onclick="sell(${p.product_id})">Sell</button>
                <button onclick="deleteProduct(${p.product_id})">Delete</button>
            </td>
        </tr>`;
    });
}

async function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let qty = document.getElementById("qty").value;

    let res = await fetch('/add_product', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, price, qty })
    });

    let data = await res.json();
    alert(data.message || data.error);

    loadProducts();
}

async function sell(id) {
    let qty = prompt("Enter quantity");

    let res = await fetch('/sell', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, qty })
    });

    let data = await res.json();
    alert(data.message || data.error);

    loadProducts();
}

async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;

    let res = await fetch('/delete_product', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
    });

    let data = await res.json();
    alert(data.message || data.error);

    loadProducts();
}

loadProducts();
</script>

</body>
</html>
